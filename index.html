<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breeding Ground</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="auth-screen">
    <div id="auth-box">
      <h1>🧬 BREEDING GROUND</h1>
      <p class="tagline">Select. Breed. Evolve.</p>
      <div id="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Login</button>
        <button class="auth-tab"        onclick="showTab('register')">Register</button>
      </div>
      <div id="login-form">
        <input type="email"    id="login-email"    placeholder="email" />
        <input type="password" id="login-password" placeholder="password" />
        <button onclick="login()">[ LOGIN ]</button>
      </div>
      <div id="register-form" class="hidden">
        <input type="email"    id="reg-email"    placeholder="email" />
        <input type="password" id="reg-password" placeholder="password (min 6 chars)" />
        <input type="password" id="reg-confirm"  placeholder="confirm password" />
        <button onclick="register()">[ CREATE ACCOUNT ]</button>
      </div>
      <p id="auth-message" class="message"></p>
    </div>
  </div>

  <div id="username-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 style="margin-top:0">// SET USERNAME</h2>
      <p class="modal-desc">This appears on the leaderboard. You can change it later.</p>
      <input type="text" id="username-input" placeholder="choose a username" maxlength="20" />
      <p id="username-message" class="message"></p>
      <div class="modal-btns">
        <button onclick="saveUsername()">[ CONFIRM ]</button>
        <button class="btn-secondary" onclick="skipUsername()">[ SKIP FOR NOW ]</button>
      </div>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <header>
      <span id="header-title">🧬 BREEDING GROUND</span>
      <span id="header-username" class="header-username" onclick="openUsernameModal()" title="Change username">—</span>
      <span id="header-user"></span>
      <span id="autosave-flash"></span>
      <button id="logout-btn" onclick="logout()">[ logout ]</button>
    </header>

    <div id="game-container">
      <div id="content-area">
        <div id="tab-bar">
          <button class="tab-btn active" id="tab-log"         onclick="switchTab('log')">LOG</button>
          <button class="tab-btn"        id="tab-population"  onclick="switchTab('population')">POPULATION</button>
          <button class="tab-btn"        id="tab-upgrades"    onclick="switchTab('upgrades')">UPGRADES</button>
          <button class="tab-btn"        id="tab-research"    onclick="switchTab('research')">RESEARCH</button>
          <button class="tab-btn"        id="tab-milestones"  onclick="switchTab('milestones')">MILESTONES</button>
          <button class="tab-btn"        id="tab-vault"       onclick="switchTab('vault')">GENE VAULT</button>
          <button class="tab-btn"        id="tab-leaderboard" onclick="switchTab('leaderboard')">LEADERBOARD</button>
        </div>
        <div id="panel-log"         class="panel">        <div id="log-output"></div></div>
        <div id="panel-population"  class="panel hidden"> <div id="population-table"></div></div>
        <div id="panel-upgrades"    class="panel hidden"> <div id="upgrades-container"></div></div>
        <div id="panel-research"    class="panel hidden"> <div id="research-container"></div></div>
        <div id="panel-milestones"  class="panel hidden"> <div id="milestones-container"></div></div>
        <div id="panel-vault"       class="panel hidden"> <div id="vault-container"></div></div>
        <div id="panel-leaderboard" class="panel hidden"> <div id="leaderboard-container"></div></div>
      </div>

      <div id="stats-panel">
        <h2>// STATS</h2>
        <div id="stats-output">
          <div class="stat-row"><span class="stat-label">Generation</span>  <span id="stat-gen">1</span></div>
          <div class="stat-row"><span class="stat-label">Population</span>  <span id="stat-pop">0</span></div>
          <div class="stat-row"><span class="stat-label">Gold</span>        <span id="stat-gold"     class="gold">0</span></div>
          <div class="stat-row"><span class="stat-label">Diamonds</span>    <span id="stat-diamonds" class="diamond">0 💎</span></div>
          <div class="stat-row"><span class="stat-label">Milestones</span>   <span id="stat-milestones" class="score-val">0</span></div>
          <div class="stat-row"><span class="stat-label">Score</span>        <span id="stat-score"      class="score-val">0</span></div>
          <div class="stat-row"><span class="stat-label">Total Bred</span>  <span id="stat-bred">0</span></div>
          <div class="stat-row"><span class="stat-label">Culled</span>      <span id="stat-culled">0</span></div>
        </div>
        <h2>// ACTIONS</h2>
        <div id="actions">
          <button onclick="breedCycle()">[ BREED ]</button>
          <button onclick="cullWeakest()">[ CULL WEAKEST ]</button>
        </div>
        <h2>// SAVE</h2>
        <div id="save-controls">
          <button onclick="saveGame()">[ SAVE NOW ]</button>
          <p id="save-status" class="message"></p>
          <p class="note">Autosaves every 5 min</p>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
